<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="המשימות שלי"/>
<title>המשימות שלי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);font-family:'Heebo',sans-serif;direction:rtl;color:#fff;overflow-x:hidden}
.orb1{position:fixed;top:-100px;right:-100px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(120,80,255,0.3),transparent 70%);pointer-events:none}
.orb2{position:fixed;bottom:-80px;left:-80px;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(0,200,180,0.2),transparent 70%);pointer-events:none}
.header{padding:48px 24px 24px;text-align:center}
.date{font-size:13px;color:#a78bfa;letter-spacing:2px;margin-bottom:8px}
h1{font-size:32px;font-weight:900;background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.streak{margin-top:8px;font-size:14px;color:#fbbf24}
.progress-box{margin:0 24px 28px;background:rgba(255,255,255,0.07);border-radius:20px;padding:20px 24px}
.progress-top{display:flex;justify-content:space-between;margin-bottom:12px;font-size:14px}
.progress-label{color:#a78bfa;font-weight:600}
.progress-pct{color:#fff;font-weight:700}
.progress-bar{background:rgba(255,255,255,0.1);border-radius:99px;height:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#06b6d4);border-radius:99px;transition:width 0.5s ease}
.section-label{font-size:12px;color:#94a3b8;letter-spacing:2px;margin-bottom:12px;text-transform:uppercase}
.tasks-section{padding:0 24px;margin-bottom:8px}
.tasks-section+.tasks-section{margin-top:20px}
.task-card{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:all 0.2s ease;-webkit-tap-highlight-color:transparent}
.task-card.done{background:rgba(124,58,237,0.2);border-color:rgba(124,58,237,0.4)}
.task-emoji{font-size:28px;flex-shrink:0}
.task-info{flex:1}
.task-title{font-weight:700;font-size:16px;color:#fff;transition:all 0.2s}
.task-card.done .task-title{color:#c4b5fd;text-decoration:line-through}
.task-sub{font-size:13px;color:#64748b;margin-top:2px}
.task-check{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s}
.task-card.done .task-check{background:linear-gradient(135deg,#7c3aed,#06b6d4);border:none}
#chat-view{display:none;flex-direction:column;height:100vh}
#chat-view.active{display:flex}
#home-view.hidden{display:none}
.chat-header{padding:48px 24px 16px;text-align:center}
.chat-header h2{font-size:24px;font-weight:900;background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.messages{flex:1;overflow-y:auto;padding:0 16px 20px}
.empty-chat{text-align:center;color:#64748b;margin-top:60px;font-size:15px;line-height:1.8}
.msg{display:flex;margin-bottom:12px}
.msg.user{justify-content:flex-start}
.msg.assistant{justify-content:flex-end}
.msg-bubble{max-width:80%;padding:12px 16px;font-size:15px;line-height:1.6}
.msg.user .msg-bubble{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.1);border-radius:18px 18px 18px 4px}
.msg.assistant .msg-bubble{background:linear-gradient(135deg,rgba(124,58,237,0.5),rgba(6,182,212,0.3));border:1px solid rgba(255,255,255,0.1);border-radius:18px 18px 4px 18px}
.chat-input{padding:12px 16px 100px;display:flex;gap:10px}
.chat-input input{flex:1;padding:14px 18px;border-radius:99px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:15px;outline:none;font-family:'Heebo',sans-serif;direction:rtl}
.chat-input input::placeholder{color:#64748b}
.send-btn{width:50px;height:50px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#7c3aed,#06b6d4);border:none;cursor:pointer;font-size:18px;color:#fff;display:flex;align-items:center;justify-content:center}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,12,41,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.08);display:flex}
.nav-btn{flex:1;padding:14px 0;background:none;border:none;cursor:pointer;color:#64748b;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'Heebo',sans-serif;-webkit-tap-highlight-color:transparent}
.nav-btn.active{color:#a78bfa}
.nav-icon{font-size:22px}
.nav-label{font-size:11px}
.celebrate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.8);flex-direction:column;gap:16px}
.celebrate-emoji{font-size:80px}
.celebrate-title{font-size:28px;font-weight:900;text-align:center;line-height:1.4}
.celebrate-sub{font-size:18px;color:#a78bfa}
.pb{padding-bottom:90px}
</style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>
<div id="home-view" class="pb">
  <div class="header">
    <div class="date" id="date-label"></div>
    <h1>המשימות שלי</h1>
    <div class="streak" id="streak-label"></div>
  </div>
  <div class="progress-box">
    <div class="progress-top">
      <span class="progress-label" id="progress-text">0 / 5 בוצעו</span>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="tasks-section">
    <div class="section-label">🌅 בוקר — 09:00</div>
    <div class="task-card" onclick="toggle(1)" id="task-1"><span class="task-emoji">📖</span><div class="task-info"><div class="task-title">מסילת ישרים</div><div class="task-sub">10 דקות</div></div><div class="task-check" id="check-1"></div></div>
    <div class="task-card" onclick="toggle(2)" id="task-2"><span class="task-emoji">📈</span><div class="task-info"><div class="task-title">דוח מניות</div><div class="task-sub">קריאה יומית</div></div><div class="task-check" id="check-2"></div></div>
  </div>
  <div class="tasks-section">
    <div class="section-label">🌙 ערב — 20:00</div>
    <div class="task-card" onclick="toggle(3)" id="task-3"><span class="task-emoji">🇬🇧</span><div class="task-info"><div class="task-title">אנגלית באפליקציה</div><div class="task-sub">לפחות רבע שעה</div></div><div class="task-check" id="check-3"></div></div>
    <div class="task-card" onclick="toggle(4)" id="task-4"><span class="task-emoji">🤸</span><div class="task-info"><div class="task-title">עמידת ידיים</div><div class="task-sub">כמה שיותר</div></div><div class="task-check" id="check-4"></div></div>
    <div class="task-card" onclick="toggle(5)" id="task-5"><span class="task-emoji">💪</span><div class="task-info"><div class="task-title">100 כפיפות בטן</div><div class="task-sub">כל הדרך למטה</div></div><div class="task-check" id="check-5"></div></div>
  </div>
</div>
<div id="chat-view">
  <div class="chat-header"><h2>המאמן שלי 💬</h2></div>
  <div class="messages" id="messages"><div class="empty-chat">שלום! אני המאמן האישי שלך 👋<br>שאל אותי על המשימות שלך,<br>בקש עצות, או פשוט ספר לי איך הולך.</div></div>
  <div class="chat-input"><input type="text" id="chat-input" placeholder="כתוב הודעה..." onkeydown="if(event.key==='Enter')sendMsg()"/><button class="send-btn" onclick="sendMsg()">➤</button></div>
</div>
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="switchView('home')"><span class="nav-icon">✅</span><span class="nav-label">משימות</span></button>
  <button class="nav-btn" id="nav-chat" onclick="switchView('chat')"><span class="nav-icon">💬</span><span class="nav-label">מאמן</span></button>
</nav>
<script>
const TASKS=5;let done={};let streak=0;let chatHistory=[];
function getTodayKey(){return new Date().toISOString().split('T')[0]}
function load(){
  const saved=localStorage.getItem('tasks_'+getTodayKey());
  if(saved)done=JSON.parse(saved);
  streak=parseInt(localStorage.getItem('streak')||'0');
  const days=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const months=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const d=new Date();
  document.getElementById('date-label').textContent='יום '+days[d.getDay()]+', '+d.getDate()+' ב'+months[d.getMonth()];
  for(let i=1;i<=TASKS;i++)updateCard(i);
  updateProgress();
  if(streak>0)document.getElementById('streak-label').textContent='🔥 רצף '+streak+' ימים';
}
function updateCard(id){
  const card=document.getElementById('task-'+id);
  const check=document.getElementById('check-'+id);
  if(done[id]){card.classList.add('done');check.textContent='✓';}
  else{card.classList.remove('done');check.textContent='';}
}
function updateProgress(){
  const count=Object.values(done).filter(Boolean).length;
  const pct=Math.round(count/TASKS*100);
  document.getElementById('progress-text').textContent=count+' / '+TASKS+' בוצעו';
  document.getElementById('progress-pct').textContent=pct+'%';
  document.getElementById('progress-fill').style.width=pct+'%';
}
function toggle(id){
  done[id]=!done[id];
  localStorage.setItem('tasks_'+getTodayKey(),JSON.stringify(done));
  updateCard(id);updateProgress();
  const count=Object.values(done).filter(Boolean).length;
  if(count===TASKS){streak++;localStorage.setItem('streak',streak);celebrate();}
}
function celebrate(){
  const el=document.createElement('div');el.className='celebrate';
  el.innerHTML='<div class="celebrate-emoji">🎉</div><div class="celebrate-title">כל הכבוד!<br>סיימת את כל המשימות!</div><div class="celebrate-sub">רצף: '+streak+' ימים 🔥</div>';
  el.onclick=()=>el.remove();document.body.appendChild(el);setTimeout(()=>el.remove(),4000);
}
function switchView(view){
  document.getElementById('home-view').classList.toggle('hidden',view==='chat');
  document.getElementById('chat-view').classList.toggle('active',view==='chat');
  document.getElementById('nav-home').classList.toggle('active',view==='home');
  document.getElementById('nav-chat').classList.toggle('active',view==='chat');
}
async function sendMsg(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();if(!text)return;input.value='';
  const msgDiv=document.getElementById('messages');
  if(msgDiv.querySelector('.empty-chat'))msgDiv.querySelector('.empty-chat').remove();
  msgDiv.innerHTML+='<div class="msg user"><div class="msg-bubble">'+text+'</div></div>';
  chatHistory.push({role:'user',content:text});
  const typing=document.createElement('div');typing.className='msg assistant';
  typing.innerHTML='<div class="msg-bubble" style="font-size:22px;padding:12px 18px">···</div>';
  msgDiv.appendChild(typing);msgDiv.scrollTop=msgDiv.scrollHeight;
  const count=Object.values(done).filter(Boolean).length;
  const pct=Math.round(count/TASKS*100);
  const taskStatus='📖 מסילת ישרים: '+(done[1]?'✅':'⬜')+'\n📈 דוח מניות: '+(done[2]?'✅':'⬜')+'\n🇬🇧 אנגלית: '+(done[3]?'✅':'⬜')+'\n🤸 עמידת ידיים: '+(done[4]?'✅':'⬜')+'\n💪 כפיפות בטן: '+(done[5]?'✅':'⬜');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'אתה מאמן אישי תומך ומעודד בעברית. המשתמש עובד על משימות יומיות לשיפור עצמי.\nמשימות היום:\n'+taskStatus+'\nהתקדמות: '+count+'/'+TASKS+' ('+pct+'%).\nרצף ימים: '+streak+'.\nתן תמיכה, עידוד, עצות מעשיות. היה קצר, חם, ואישי. אל תשתמש בכוכביות או markdown.',messages:chatHistory})});
    const data=await res.json();
    const reply=data.content?.[0]?.text||'ס​​​​​​​​​​​​​​​​

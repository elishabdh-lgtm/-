<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>המשימות שלי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,0,0,0)}
html,body{height:100%;overflow-x:hidden}
body{background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);font-family:'Heebo',sans-serif;direction:rtl;color:#fff}
.header{padding:48px 24px 20px;text-align:center}
.date{font-size:13px;color:#a78bfa;margin-bottom:8px}
h1{font-size:32px;font-weight:900;background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.streak{margin-top:8px;font-size:14px;color:#fbbf24}
.progress-box{margin:0 24px 24px;background:rgba(255,255,255,0.07);border-radius:20px;padding:20px 24px}
.progress-top{display:flex;justify-content:space-between;margin-bottom:12px;font-size:14px}
.progress-label{color:#a78bfa;font-weight:600}
.progress-pct{font-weight:700}
.progress-bar{background:rgba(255,255,255,0.1);border-radius:99px;height:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#06b6d4);border-radius:99px;transition:width 0.5s}
.section-label{font-size:12px;color:#94a3b8;letter-spacing:2px;margin-bottom:12px}
.tasks-section{padding:0 24px;margin-bottom:8px}
.tasks-section+.tasks-section{margin-top:20px}
.task-card{
  display:flex;align-items:center;gap:16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;padding:16px 18px;margin-bottom:10px;
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
  position:relative;
  z-index:1;
}
.task-card:active{opacity:0.7;transform:scale(0.98)}
.task-card.done{background:rgba(124,58,237,0.2);border-color:rgba(124,58,237,0.4)}
.task-emoji{font-size:28px;flex-shrink:0;pointer-events:none}
.task-info{flex:1;pointer-events:none}
.task-title{font-weight:700;font-size:16px}
.task-card.done .task-title{color:#c4b5fd;text-decoration:line-through}
.task-sub{font-size:13px;color:#64748b;margin-top:2px}
.task-check{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:14px;pointer-events:none}
.task-card.done .task-check{background:linear-gradient(135deg,#7c3aed,#06b6d4);border:none}
#chat-view{display:none;flex-direction:column;height:100vh;position:fixed;inset:0;background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);z-index:10}
#chat-view.active{display:flex}
.chat-header{padding:48px 24px 16px;text-align:center;flex-shrink:0}
.chat-header h2{font-size:24px;font-weight:900;background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.messages{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.empty-chat{text-align:center;color:#64748b;margin-top:60px;font-size:15px;line-height:1.8}
.msg{display:flex;margin-bottom:12px}
.msg.user{justify-content:flex-start}
.msg.bot{justify-content:flex-end}
.bubble{max-width:80%;padding:12px 16px;font-size:15px;line-height:1.6;border-radius:18px}
.msg.user .bubble{background:rgba(255,255,255,0.1);border-radius:18px 18px 18px 4px}
.msg.bot .bubble{background:linear-gradient(135deg,rgba(124,58,237,0.5),rgba(6,182,212,0.3));border-radius:18px 18px 4px 18px}
.chat-input-row{padding:12px 16px 100px;display:flex;gap:10px;flex-shrink:0}
.chat-input-row input{flex:1;padding:14px 18px;border-radius:99px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:15px;outline:none;font-family:'Heebo',sans-serif;direction:rtl}
.chat-input-row input::placeholder{color:#64748b}
.send-btn{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#06b6d4);border:none;cursor:pointer;font-size:18px;color:#fff;flex-shrink:0;touch-action:manipulation}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,12,41,0.97);border-top:1px solid rgba(255,255,255,0.08);display:flex;z-index:20}
.nav-btn{flex:1;padding:14px 0;background:none;border:none;cursor:pointer;color:#64748b;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'Heebo',sans-serif;touch-action:manipulation}
.nav-btn.active{color:#a78bfa}
.nav-icon{font-size:22px}
.nav-label{font-size:11px}
.pb{padding-bottom:90px}
.celebrate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.85);flex-direction:column;gap:16px}
.celebrate-emoji{font-size:80px}
.celebrate-title{font-size:26px;font-weight:900;text-align:center;line-height:1.4}
.celebrate-sub{font-size:18px;color:#a78bfa}
</style>
</head>
<body>
<div id="home-view" class="pb">
  <div class="header">
    <div class="date" id="date-label"></div>
    <h1>המשימות שלי</h1>
    <div class="streak" id="streak-label"></div>
  </div>
  <div class="progress-box">
    <div class="progress-top">
      <span class="progress-label" id="progress-text">0 / 5 בוצעו</span>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="tasks-section">
    <div class="section-label">🌅 בוקר — 09:00</div>
    <div class="task-card" id="task-1"><span class="task-emoji">📖</span><div class="task-info"><div class="task-title">מסילת ישרים</div><div class="task-sub">10 דקות</div></div><div class="task-check" id="check-1"></div></div>
    <div class="task-card" id="task-2"><span class="task-emoji">📈</span><div class="task-info"><div class="task-title">דוח מניות</div><div class="task-sub">קריאה יומית</div></div><div class="task-check" id="check-2"></div></div>
  </div>
  <div class="tasks-section">
    <div class="section-label">🌙 ערב — 20:00</div>
    <div class="task-card" id="task-3"><span class="task-emoji">🇬🇧</span><div class="task-info"><div class="task-title">אנגלית באפליקציה</div><div class="task-sub">לפחות רבע שעה</div></div><div class="task-check" id="check-3"></div></div>
    <div class="task-card" id="task-4"><span class="task-emoji">🤸</span><div class="task-info"><div class="task-title">עמידת ידיים</div><div class="task-sub">כמה שיותר</div></div><div class="task-check" id="check-4"></div></div>
    <div class="task-card" id="task-5"><span class="task-emoji">💪</span><div class="task-info"><div class="task-title">100 כפיפות בטן</div><div class="task-sub">כל הדרך למטה</div></div><div class="task-check" id="check-5"></div></div>
  </div>
</div>
<div id="chat-view">
  <div class="chat-header"><h2>המאמן שלי 💬</h2></div>
  <div class="messages" id="messages"><div class="empty-chat">שלום! אני המאמן האישי שלך 👋<br>שאל אותי על המשימות שלך,<br>בקש עצות, או פשוט ספר לי איך הולך.</div></div>
  <div class="chat-input-row"><input type="text" id="chat-input" placeholder="כתוב הודעה..."/><button class="send-btn" id="send-btn">➤</button></div>
</div>
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home"><span class="nav-icon">✅</span><span class="nav-label">משימות</span></button>
  <button class="nav-btn" id="nav-chat"><span class="nav-icon">💬</span><span class="nav-label">מאמן</span></button>
</nav>
<script>
var TASKS=5,done={},streak=0,history=[];
function key(){return new Date().toISOString().split('T')[0]}
function load(){
  try{done=JSON.parse(localStorage.getItem('t_'+key()))||{};}catch(e){done={};}
  streak=parseInt(localStorage.getItem('streak')||0);
  var days=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  var months=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  var d=new Date();
  document.getElementById('date-label').textContent='יום '+days[d.getDay()]+', '+d.getDate()+' ב'+months[d.getMonth()];
  for(var i=1;i<=TASKS;i++)render(i);
  updateProgress();
  if(streak>0)document.getElementById('streak-label').textContent='🔥 רצף '+streak+' ימים';
}
function render(id){
  var card=document.getElementById('task-'+id);
  var check=document.getElementById('check-'+id);
  if(done[id]){card.classList.add('done');check.textContent='✓';}
  else{card.classList.remove('done');check.textContent='';}
}
function updateProgress(){
  var count=Object.values(done).filter(Boolean).length;
  var pct=Math.round(count/TASKS*100);
  document.getElementById('progress-text').textContent=count+' / '+TASKS+' בוצעו';
  document.getElementById('progress-pct').textContent=pct+'%';
  document.getElementById('progress-fill').style.width=pct+'%';
}
function toggle(id){
  done[id]=!done[id];
  localStorage.setItem('t_'+key(),JSON.stringify(done));
  render(id);updateProgress();
  if(Object.values(done).filter(Boolean).length===TASKS){streak++;localStorage.setItem('streak',streak);celebrate();}
}
for(var i=1;i<=TASKS;i++){
  (function(id){
    var el=document.getElementById('task-'+id);
    el.addEventListener('touchend',function(e){e.preventDefault();toggle(id);},{passive:false});
    el.addEventListener('click',function(e){toggle(id);});
  })(i);
}
function celebrate(){
  var el=document.createElement('div');el.className='celebrate';
  el.innerHTML='<div class="celebrate-emoji">🎉</div><div class="celebrate-title">כל הכבוד!<br>סיימת את כל המשימות!</div><div class="celebrate-sub">רצף: '+streak+' ימים 🔥</div>';
  el.addEventListener('touchend',function(){el.remove();});
  el.addEventListener('click',function(){el.remove();});
  document.body.appendChild(el);setTimeout(function(){el.remove();},4000);
}
document.getElementById('nav-home').addEventListener('click',function(){
  document.getElementById('home-view').style.display='';
  document.getElementById('chat-view').classList.remove('active');
  document.getElementById('nav-home').classList.add('active');
  document.getElementById('nav-chat').classList.remove('active');
});
document.getElementById('nav-chat').addEventListener('click',function(){
  document.getElementById('home-view').style.display='none';
  document.getElementById('chat-view').classList.add('active');
  document.getElementById('nav-chat').classList.add('active');
  document.getElementById('nav-home').classList.remove('active');
});
function addMsg(role,text){
  var d=document.getElementById('messages');
  var e=d.querySelector('.empty-chat');if(e)e.remove();
  var div=document.createElement('div');div.className='msg '+role;
  var b=document.createElement('div');b.className='bubble';b.textContent=text;
  div.appendChild(b);d.appendChild(div);d.scrollTop=d.scrollHeight;
}
async function send(){
  var inp=document.getElementById('chat-input');
  var text=inp.value.trim();if(!text)return;inp.value='';
  addMsg('user',text);history.push({role:'user',content:text});
  var count=Object.values(done).filter(Boolean).length;
  var status='📖מסילת ישרים:'+(done[1]?'✅':'⬜')+' 📈דוח מניות:'+(done[2]?'✅':'⬜')+' 🇬🇧אנגלית:'+(done[3]?'✅':'⬜')+' 🤸עמידת ידיים:'+(done[4]?'✅':'⬜')+' 💪כפיפות:'+(done[5]?'✅':'⬜');
  var typing=document.createElement('div');typing.className='msg bot';typing.innerHTML='<div class="bubble">···</div>';
  document.getElementById('messages').appendChild(typing);
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'אתה מאמן אישי תומך בעברית. משימות: '+status+'. בוצעו '+count+'/5. רצף '+streak+' ימים. היה קצר, חם, עידוד.',messages:history})});
    var data=await res.json();
    var reply=data.content&&data.content[0]?data.content[0].text:'סורי, שגיאה!';
    history.push({role:'assistant',content:reply});
    typing.remove();addMsg('bot',reply);
  }catch(e){typing.remove();addMsg('bot','לא הצלחתי להתחבר, נסה שוב!');}
}
document.getElementById('send-btn').addEventListener('click',send);
document.getElementById('chat-input').addEventListener('keydown',function(e){if(e.key==='Enter')send();});
load();
</script>
</body>
</html>
